<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sterna — 2026</title>
  <meta name="description" content="Infrastructure for how organizations learn." />

  <!-- Open Graph / Social -->
  <meta property="og:title" content="Sterna" />
  <meta property="og:description" content="Infrastructure for how organizations learn." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sterna.vc" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Sterna" />
  <meta name="twitter:description" content="Infrastructure for how organizations learn." />

  <!-- Minimal inline SVG favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230A0B0D'/%3E%3Ctext x='16' y='22' font-family='Helvetica,Arial,sans-serif' font-size='18' font-weight='500' fill='%23E8E3D8' text-anchor='middle'%3Es%3C/text%3E%3C/svg%3E" />

  <!-- Fonts: IBM Plex Sans for content, IBM Plex Mono for institutional chrome -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0A0B0D;
      --fg: #E8E3D8;
      --fg-mid: rgba(232, 227, 216, 0.78);
      --fg-dim: rgba(232, 227, 216, 0.55);
      --fg-faint: rgba(232, 227, 216, 0.18);
      --rule: rgba(232, 227, 216, 0.08);
      --font-sans: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --step: 0.5rem;
      --ease: cubic-bezier(0.2, 0.65, 0.3, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      font-variant-numeric: tabular-nums;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      position: relative;
      overflow-x: hidden;
    }

    /* Very fine grain — material texture, not glow */
    .noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/%3E%3C/svg%3E");
      opacity: 0.05;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: overlay;
    }

    /* Document spine — single vertical hairline on the right edge */
    .spine {
      position: fixed;
      top: 0;
      bottom: 0;
      right: 0;
      width: 1px;
      background: var(--rule);
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: fade-in 1.4s var(--ease) 0.15s forwards;
    }

    /* Top-right institutional anchor — sits inside the spine */
    .corner-mark {
      position: fixed;
      top: calc(var(--step) * 4);
      right: calc(var(--step) * 6);
      z-index: 3;
      font-family: var(--font-mono);
      font-weight: 400;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg-faint);
      opacity: 0;
      animation: rise 1.4s var(--ease) 0.4s forwards;
    }

    @media (min-width: 720px) {
      .corner-mark {
        top: calc(var(--step) * 6);
        right: calc(var(--step) * 8);
      }
    }

    /* Page: centered composition */
    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--step) * 12) calc(var(--step) * 5);
      position: relative;
      z-index: 2;
    }

    .content {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: calc(var(--step) * 6);
    }

    @media (min-width: 720px) {
      .page {
        padding: calc(var(--step) * 16) calc(var(--step) * 8);
      }
      .content {
        gap: calc(var(--step) * 8);
      }
    }

    /* Wordmark — sans, weight 500, opened tracking, restrained scale */
    .wordmark {
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: clamp(1.75rem, 3vw, 2.25rem);
      line-height: 1;
      letter-spacing: 0.005em;
      color: var(--fg);
      opacity: 0;
      animation: rise 1.4s var(--ease) 0.25s forwards;
    }

    /* Claim group: thesis + subhead — Plex Sans throughout, weighted by hierarchy */
    .claim {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: calc(var(--step) * 3);
    }

    .thesis {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: clamp(1.5rem, 2.5vw, 1.95rem);
      line-height: 1.32;
      letter-spacing: -0.005em;
      color: var(--fg);
      max-width: 24ch;
      opacity: 0;
      animation: rise 1.4s var(--ease) 0.6s forwards;
    }

    .subhead {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: clamp(0.95rem, 1.3vw, 1.05rem);
      line-height: 1.5;
      letter-spacing: 0;
      color: var(--fg-mid);
      max-width: 32ch;
      opacity: 0;
      animation: rise 1.4s var(--ease) 0.9s forwards;
    }

    /* Provenance — mono, uppercase, stacked across two lines */
    .provenance {
      font-family: var(--font-mono);
      font-weight: 400;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg-dim);
      line-height: 1.9;
      opacity: 0;
      animation: rise 1.4s var(--ease) 1.25s forwards;
    }

    .provenance span {
      display: block;
    }

    /* Footer mark — centered */
    .page-footer {
      padding: calc(var(--step) * 4) calc(var(--step) * 5);
      text-align: center;
      position: relative;
      z-index: 2;
      font-family: var(--font-mono);
      font-weight: 400;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--fg-faint);
      opacity: 0;
      animation: rise 1s var(--ease) 1.75s forwards;
      text-transform: uppercase;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Honor reduced-motion preference */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .wordmark,
      .thesis,
      .subhead,
      .provenance,
      .corner-mark,
      .spine,
      .page-footer {
        opacity: 1;
        transform: none;
      }
    }

    ::selection {
      background: rgba(232, 227, 216, 0.18);
      color: var(--fg);
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="spine" aria-hidden="true"></div>

  <div class="corner-mark" aria-hidden="true">Index I</div>

  <main class="page">
    <div class="content">
      <h1 class="wordmark">Sterna</h1>

      <div class="claim">
        <p class="thesis">Enterprise intelligence compounds when learning is governed.</p>
        <p class="subhead">Infrastructure for how organizations learn.</p>
      </div>

      <p class="provenance">
        <span>Founded 2026</span>
        <span>More soon</span>
      </p>
    </div>
  </main>

  <footer class="page-footer">
    <span>MMXXVI</span>
  </footer>
</body>
</html>
